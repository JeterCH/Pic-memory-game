<!DOCTYPE html>
<html>
<head>
    <title>图片记忆游戏byJeter</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; font-size: 48px; }
        h1 { font-size: 72px; }
        label { font-size: 48px; }
        button { font-size: 48px; padding: 20px 40px; margin: 10px; }
        select { font-size: 48px; padding: 10px; }
        img { max-width: 800px; display: block; margin: 10px auto; }
        #scoreboard { margin-top: 20px; width: 95%; margin-left: auto; margin-right: auto; border: 1px solid #ccc; }
        #scoreboard table { width: 100%; border-collapse: collapse; font-size: 36px; }
        #scoreboard th, #scoreboard td { border: 1px solid #ccc; padding: 10px; text-align: center; }

        input[type="checkbox"] {
            width: 60px;
            height: 60px;
            margin-right: 20px;
        }

        #duplicate-question button {
            font-size: 72px;
            padding: 30px 60px;
            margin: 40px;
        }

        #thumbnail-container {
            margin-top: 20px;
        }
        #thumbnail-container img {
            width: 150px;
            margin: 10px;
            display: inline-block;
        }

        #progress {
            margin-top: 20px;
            font-size: 60px;
        }

        /* 关键：让结果文字支持换行符，分行显示 */
        #result-message {
            display:none;
            white-space: pre-line;
            margin-top: 20px;
            font-size: 48px;
        }
    </style>
</head>
<body>
    <h1>请记忆图片，并回答是否有重复。</h1>
    <div id="setup">
        <label>修改显示图片数量：</label>
        <select id="num-pics">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select>
        <br><br>
        <label>修改每张图片显示几秒：</label>
        <select id="seconds">
            <option value="1">1 秒</option>
            <option value="2">2 秒</option>
            <option value="3" selected>3 秒</option>
            <option value="4">4 秒</option>
            <option value="5">5 秒</option>
        </select>
        <br><br>
        <label>
            <input type="checkbox" id="allow-consecutive" checked>
            允许出现连续重复
        </label>
        <br><br>
        <button id="start-button">开始游戏</button>
    </div>

    <!-- 进度提示 -->
    <div id="progress"></div>

    <!-- 图片展示 -->
    <div id="image-container"></div>

    <!-- 重复问题 -->
    <div id="duplicate-question" style="display:none;">
        <p>是否有重复的图片？</p>
        <button id="yes-button">是</button>
        <button id="no-button">否</button>
    </div>

    <!-- 结果 -->
    <div id="result-message" style="display:none;"></div>

    <!-- 缩略图展示 -->
    <div id="thumbnail-container" style="display:none;"></div>

    <!-- 新一局 -->
    <div id="new-round-question" style="display:none;">
        <button id="yes-round-button">再来一局</button>
    </div>

    <!-- 记分板 -->
    <div id="scoreboard" style="display:none;">
        <h2>记分板</h2>
        <table>
            <thead>
                <tr>
                    <th>局数</th>
                    <th>图片数量</th>
                    <th>每张秒数</th>
                    <th>玩家作答</th>
                    <th>正确答案</th>
                    <th>重复位置</th>
                </tr>
            </thead>
            <tbody id="scoreboard-body"></tbody>
        </table>
    </div>

    <script>
        let chosenImages = []; // 存储图片的blob URL，确保图片一致性
        let currentIndex = 0;
        let secondsPerPic = 2;
        let hasDuplicate = false;
        let round = 0;
        let duplicatePositions = [];
        let allowConsecutiveDuplicate = true;

        // 预加载图片并返回blob URL（核心：避免picsum随机返回不同图片）
        async function preloadImage() {
            try {
                const randomNum = Math.floor(Math.random() * 10000);
                const imgUrl = `https://picsum.photos/800/600?random=${randomNum}`;
                const response = await fetch(imgUrl);
                const blob = await response.blob();
                return URL.createObjectURL(blob);
            } catch (error) {
                console.error("图片加载失败：", error);
                // 备用图片（防止加载失败）
                return `https://picsum.photos/800/600?random=9999`;
            }
        }

        // 生成不重复的图片（排除连续重复/已存在）
        async function generateUniqueImages(numPics) {
            const images = [];
            while (images.length < numPics) {
                const imgBlobUrl = await preloadImage();
                // 检查连续重复（禁用时）或已存在
                const isConsecutiveDuplicate = !allowConsecutiveDuplicate && images.length > 0 && imgBlobUrl === images[images.length - 1];
                const isDuplicate = images.includes(imgBlobUrl);
                if (!isConsecutiveDuplicate && !isDuplicate) {
                    images.push(imgBlobUrl);
                }
            }
            return images;
        }

        async function startGame() {
            // 重置所有界面元素
            document.getElementById('setup').style.display = 'none';
            document.getElementById('progress').innerHTML = '';
            document.getElementById('image-container').innerHTML = '';
            document.getElementById('result-message').innerText = '';
            document.getElementById('result-message').style.display = 'none';
            document.getElementById('duplicate-question').style.display = 'none';
            document.getElementById('new-round-question').style.display = 'none';
            document.getElementById('thumbnail-container').innerHTML = '';
            document.getElementById('thumbnail-container').style.display = 'none';
            document.getElementById('scoreboard').style.display = 'none';

            // 获取用户设置
            const numPics = parseInt(document.getElementById('num-pics').value);
            secondsPerPic = parseInt(document.getElementById('seconds').value);
            allowConsecutiveDuplicate = document.getElementById('allow-consecutive').checked;

            // 初始化本轮数据
            hasDuplicate = Math.random() < 0.5;
            duplicatePositions = [];
            chosenImages = await generateUniqueImages(numPics);

            // 处理重复逻辑（复用已有的blob URL，确保图片一致）
            if (hasDuplicate) {
                const duplicateIndex = Math.floor(Math.random() * (numPics - 1));
                let replaceIndex = Math.floor(Math.random() * numPics);
                while (replaceIndex === duplicateIndex) {
                    replaceIndex = Math.floor(Math.random() * numPics);
                }
                chosenImages[replaceIndex] = chosenImages[duplicateIndex];
                duplicatePositions.push(duplicateIndex + 1, replaceIndex + 1);
            }

            currentIndex = 0;
            round++;
            showImage();
        }

        // 优化后的showImage：保证图片可见时长严格符合设置
        function showImage() {
            if (currentIndex < chosenImages.length) {
                // 更新进度提示
                document.getElementById('progress').innerHTML = 
                    `正在显示第 ${currentIndex + 1} / ${chosenImages.length} 张`;

                // 创建图片元素，确保加载完成后再计时
                const img = document.createElement('img');
                img.src = chosenImages[currentIndex];
                img.alt = `第${currentIndex+1}张图片`;
                img.style.maxWidth = '800px';
                img.style.display = 'block';
                img.style.margin = '10px auto';

                // 清空容器并添加图片
                const imgContainer = document.getElementById('image-container');
                imgContainer.innerHTML = '';
                imgContainer.appendChild(img);

                // 关键：图片加载完成后，再启动显示时长的计时
                img.onload = function() {
                    setTimeout(() => {
                        imgContainer.innerHTML = ''; // 清空图片
                        setTimeout(() => {
                            currentIndex++;
                            showImage(); // 加载下一张
                        }, 1000); // 两张图片间隔1秒
                    }, secondsPerPic * 1000); // 严格按设置的秒数显示
                };

                // 图片加载失败的兜底（避免计时卡住）
                img.onerror = function() {
                    setTimeout(() => {
                        imgContainer.innerHTML = '';
                        setTimeout(() => {
                            currentIndex++;
                            showImage();
                        }, 1000);
                    }, secondsPerPic * 1000);
                };
            } else {
                // 所有图片展示完毕，清空进度提示
                document.getElementById('progress').innerHTML = '';
                document.getElementById('duplicate-question').style.display = 'block';
            }
        }

        function endRound(answer) {
            // 核心修复：清空进度提示，解决progress残留问题
            document.getElementById('progress').innerHTML = '';
            
            // 生成结果提示（拆分三行显示）
            const correct = hasDuplicate ? "是" : "否";
            let message = `你的回答：${answer}。\n正确答案：${correct}。`;
            if (hasDuplicate) {
                message += `\n重复位置：${duplicatePositions.join(" 和 ")}。`;
            }
            document.getElementById('result-message').innerText = message;
            document.getElementById('result-message').style.display = 'block';
            document.getElementById('new-round-question').style.display = 'block';

            // 渲染缩略图（使用缓存的blob URL，和展示的图片完全一致）
            const thumbContainer = document.getElementById('thumbnail-container');
            thumbContainer.innerHTML = "<h3>本轮所有图片缩略图：</h3>";
            chosenImages.forEach((imgBlobUrl, idx) => {
                thumbContainer.innerHTML += `<img src="${imgBlobUrl}" alt="第${idx+1}张">`;
            });
            thumbContainer.style.display = 'block';

            // 更新记分板
            const sb = document.getElementById('scoreboard-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${round}</td>
                <td>${chosenImages.length}</td>
                <td>${secondsPerPic}</td>
                <td>${answer}</td>
                <td>${correct}</td>
                <td>${hasDuplicate ? duplicatePositions.join(" 和 ") : "-"}</td>
            `;
            sb.appendChild(row);
            document.getElementById('scoreboard').style.display = 'block';

            // 释放blob URL，避免内存泄漏
            chosenImages.forEach(url => URL.revokeObjectURL(url));
        }

        // 页面加载完成后绑定事件
        window.onload = function() {
            // 开始游戏
            document.getElementById('start-button').addEventListener('click', startGame);
            // 回答“是”
            document.getElementById('yes-button').addEventListener('click', function() {
                document.getElementById('duplicate-question').style.display = 'none';
                endRound("是");
            });
            // 回答“否”
            document.getElementById('no-button').addEventListener('click', function() {
                document.getElementById('duplicate-question').style.display = 'none';
                endRound("否");
            });
            // 再来一局
            document.getElementById('yes-round-button').addEventListener('click', function() {
                document.getElementById('setup').style.display = 'block';
                document.getElementById('new-round-question').style.display = 'none';
            });
        };
    </script>
</body>
</html>
