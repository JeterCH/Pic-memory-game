<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pic Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }

        .game-title {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .game-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #4a5568;
        }

        .stats-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 15px;
            perspective: 1000px;
        }

        .memory-card {
            height: 150px;
            width: 150px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        .memory-card.flip {
            transform: rotateY(180deg);
        }

        .memory-card:active {
            transform: scale(0.97);
            transition: transform 0.2s;
        }

        .front-face, .back-face {
            width: 100%;
            height: 100%;
            position: absolute;
            padding: 20px;
            backface-visibility: hidden;
            border-radius: 8px;
        }

        .front-face {
            transform: rotateY(180deg);
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .front-face img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .back-face {
            background-color: #4299e1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        .game-controls {
            margin-top: 30px;
        }

        .reset-btn {
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #38b2ac;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-btn:hover {
            background-color: #319795;
        }

        .loading-text {
            font-size: 1.2rem;
            color: #4a5568;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .memory-game {
                grid-template-columns: repeat(3, 120px);
            }
            .memory-card {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <h1 class="game-title">Memory Game</h1>
    <div class="loading-text" id="loadingText">加载图片中...</div>
    <div class="game-stats">
        <div class="stats-item">
            <span class="stats-label">时间</span>
            <span id="seconds">0</span> 秒
        </div>
        <div class="stats-item">
            <span class="stats-label">步数</span>
            <span id="moves">0</span>
        </div>
    </div>
    <div class="memory-game" id="gameBoard"></div>
    <div class="game-controls">
        <button class="reset-btn" id="resetBtn">重置游戏</button>
    </div>

    <script>
        // 游戏核心变量
        const cardImages = [
            'https://picsum.photos/seed/cat1/150/150',
            'https://picsum.photos/seed/dog1/150/150',
            'https://picsum.photos/seed/bird1/150/150',
            'https://picsum.photos/seed/fish1/150/150',
            'https://picsum.photos/seed/rabbit1/150/150',
            'https://picsum.photos/seed/hamster1/150/150',
            'https://picsum.photos/seed/turtle1/150/150',
            'https://picsum.photos/seed/snake1/150/150'
        ];

        let gameBoard = document.getElementById('gameBoard');
        let secondsDisplay = document.getElementById('seconds');
        let movesDisplay = document.getElementById('moves');
        let resetBtn = document.getElementById('resetBtn');
        let loadingText = document.getElementById('loadingText');
        
        let cards = [];
        let seconds = 0;
        let moves = 0;
        let timer = null;
        let isGameStarted = false;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        
        // 图片加载相关变量
        let loadedImageCount = 0;
        let totalImageCount = cardImages.length * 2; // 每张图有两张卡牌

        // 初始化游戏
        function initGame() {
            // 重置所有状态
            resetGameState();
            // 预加载所有图片
            preloadAllImages().then(() => {
                // 所有图片加载完成后渲染卡牌
                renderCards();
                // 启动计时
                startTimer();
                loadingText.textContent = "游戏就绪！";
            });
        }

        // 预加载所有图片
        function preloadAllImages() {
            const preloadPromises = [];
            
            // 对每张图片创建预加载Promise
            cardImages.forEach(imgUrl => {
                preloadPromises.push(preloadSingleImage(imgUrl));
                // 因为每张图有两张卡牌，所以推两次
                preloadPromises.push(preloadSingleImage(imgUrl));
            });

            // 等待所有图片加载完成
            return Promise.all(preloadPromises);
        }

        // 预加载单张图片
        function preloadSingleImage(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    loadedImageCount++;
                    const progress = Math.floor((loadedImageCount / totalImageCount) * 100);
                    loadingText.textContent = `加载图片中... ${progress}%`;
                    resolve();
                };
                img.onerror = () => {
                    // 图片加载失败也视为完成（避免游戏卡住）
                    loadedImageCount++;
                    resolve();
                };
                img.src = url;
            });
        }

        // 渲染卡牌到页面
        function renderCards() {
            // 清空游戏面板
            gameBoard.innerHTML = '';
            
            // 复制图片数组（每张图两张卡牌）并洗牌
            let cardPairs = [...cardImages, ...cardImages];
            cardPairs = shuffleArray(cardPairs);

            // 创建卡牌元素
            cardPairs.forEach((imgUrl, index) => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.framework = index; // 用index作为标识

                // 正面（图片）
                const frontFace = document.createElement('div');
                frontFace.classList.add('front-face');
                const img = document.createElement('img');
                img.src = imgUrl;
                img.alt = `Memory card ${index}`;
                frontFace.appendChild(img);

                // 背面
                const backFace = document.createElement('div');
                backFace.classList.add('back-face');
                backFace.textContent = "?";

                // 组装卡牌
                card.appendChild(frontFace);
                card.appendChild(backFace);

                // 绑定点击事件
                card.addEventListener('click', flipCard);

                // 添加到游戏面板
                gameBoard.appendChild(card);
            });

            // 获取所有卡牌元素
            cards = document.querySelectorAll('.memory-card');
        }

        // 洗牌函数（Fisher-Yates 算法）
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 翻转卡牌逻辑
        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                // 第一次点击
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // 第二次点击
            secondCard = this;
            moves++;
            movesDisplay.textContent = moves;

            // 检查是否匹配
            checkForMatch();
        }

        // 检查卡牌是否匹配
        function checkForMatch() {
            const isMatch = firstCard.querySelector('img').src === secondCard.querySelector('img').src;
            isMatch ? disableCards() : unflipCards();
        }

        // 匹配成功：禁用卡牌点击
        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();

            // 检查游戏是否结束
            checkGameOver();
        }

        // 匹配失败：翻回卡牌
        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        // 重置面板状态
        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // 启动计时器（所有图片加载完成后执行）
        function startTimer() {
            if (timer) clearInterval(timer);
            seconds = 0;
            secondsDisplay.textContent = seconds;
            isGameStarted = true;

            timer = setInterval(() => {
                if (isGameStarted) {
                    seconds++;
                    secondsDisplay.textContent = seconds;
                }
            }, 1000);
        }

        // 重置游戏状态
        function resetGameState() {
            // 停止计时器
            clearInterval(timer);
            // 重置变量
            seconds = 0;
            moves = 0;
            loadedImageCount = 0;
            isGameStarted = false;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            // 更新显示
            secondsDisplay.textContent = 0;
            movesDisplay.textContent = 0;
            loadingText.textContent = "加载图片中...";
        }

        // 检查游戏是否结束
        function checkGameOver() {
            const flippedCards = document.querySelectorAll('.flip');
            if (flippedCards.length === cards.length) {
                isGameStarted = false;
                clearInterval(timer);
                setTimeout(() => {
                    alert(`恭喜！你完成了游戏！\n用时：${seconds} 秒\n步数：${moves} 步`);
                }, 500);
            }
        }

        // 绑定重置按钮事件
        resetBtn.addEventListener('click', initGame);

        // 页面加载完成后初始化游戏
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
