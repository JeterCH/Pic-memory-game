<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pic Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }

        .game-title {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .game-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #4a5568;
        }

        .stats-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 15px;
            perspective: 1000px;
        }

        .memory-card {
            height: 150px;
            width: 150px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        .memory-card.flip {
            transform: rotateY(180deg);
        }

        .memory-card:active {
            transform: scale(0.97);
            transition: transform 0.2s;
        }

        .front-face, .back-face {
            width: 100%;
            height: 100%;
            position: absolute;
            padding: 20px;
            backface-visibility: hidden;
            border-radius: 8px;
        }

        .front-face {
            transform: rotateY(180deg);
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .front-face img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .back-face {
            background-color: #4299e1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        .game-controls {
            margin-top: 30px;
        }

        .reset-btn {
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #38b2ac;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-btn:hover {
            background-color: #319795;
        }

        .loading-text {
            font-size: 1.2rem;
            color: #4a5568;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1 class="game-title">Memory Game</h1>
    <div class="loading-text" id="loadingText">加载图片中...</div>
    <div class="game-stats">
        <div class="stats-item">
            <span class="stats-label">时间</span>
            <span id="seconds">0</span> 秒
        </div>
        <div class="stats-item">
            <span class="stats-label">步数</span>
            <span id="moves">0</span>
        </div>
    </div>
    <div class="memory-game" id="gameBoard"></div>
    <div class="game-controls">
        <button class="reset-btn" id="resetBtn">重置游戏</button>
    </div>

<script>
    const cardImages = [
        'https://picsum.photos/seed/cat1/150/150',
        'https://picsum.photos/seed/dog1/150/150',
        'https://picsum.photos/seed/bird1/150/150',
        'https://picsum.photos/seed/fish1/150/150',
        'https://picsum.photos/seed/rabbit1/150/150',
        'https://picsum.photos/seed/hamster1/150/150',
        'https://picsum.photos/seed/turtle1/150/150',
        'https://picsum.photos/seed/snake1/150/150'
    ];

    let gameBoard = document.getElementById('gameBoard');
    let secondsDisplay = document.getElementById('seconds');
    let movesDisplay = document.getElementById('moves');
    let resetBtn = document.getElementById('resetBtn');
    let loadingText = document.getElementById('loadingText');

    let cards = [];
    let seconds = 0;
    let moves = 0;
    let timer = null;
    let isGameStarted = false;
    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;

    let loadedImageCount = 0;
    let totalImageCount = cardImages.length * 2;

    // 用来保存当前这局真正使用的图片（关键修复）
    let currentGameImages = [];

    function initGame() {
        resetGameState();
        createGameImagePairs(); // 先固定本局图片
        preloadAllImages().then(() => {
            renderCards();
            startTimer();
            loadingText.textContent = "游戏就绪！";
        });
    }

    // ✅ 修复1：先创建固定的一对对图片，不再动态拼数组
    function createGameImagePairs() {
        currentGameImages = [...cardImages, ...cardImages];
        currentGameImages = shuffleArray(currentGameImages);
    }

    // ✅ 修复2：预加载本局固定的图片
    function preloadAllImages() {
        return new Promise((resolve) => {
            if (currentGameImages.length === 0) resolve();

            let loaded = 0;
            currentGameImages.forEach(url => {
                const img = new Image();
                img.onload = done;
                img.onerror = done;
                img.src = url;

                function done() {
                    loaded++;
                    loadingText.textContent = `加载中 ${Math.round(loaded / currentGameImages.length * 100)}%`;
                    if (loaded === currentGameImages.length) resolve();
                }
            });
        });
    }

    // ✅ 修复3：渲染时直接用本局固定图片，不再重新洗牌
    function renderCards() {
        gameBoard.innerHTML = '';
        currentGameImages.forEach((url, index) => {
            const card = document.createElement('div');
            card.classList.add('memory-card');
            card.dataset.index = index;

            const front = document.createElement('div');
            front.classList.add('front-face');
            const img = document.createElement('img');
            img.src = url; // 直接用本局固定URL，不会变
            front.appendChild(img);

            const back = document.createElement('div');
            back.classList.add('back-face');
            back.textContent = '?';

            card.appendChild(front);
            card.appendChild(back);
            card.addEventListener('click', flipCard);
            gameBoard.appendChild(card);
        });
        cards = document.querySelectorAll('.memory-card');
    }

    function flipCard() {
        if (lockBoard) return;
        if (this === firstCard) return;
        this.classList.add('flip');

        if (!hasFlippedCard) {
            hasFlippedCard = true;
            firstCard = this;
        } else {
            secondCard = this;
            moves++;
            movesDisplay.textContent = moves;
            checkMatch();
        }
    }

    // ✅ 修复4：匹配判断用 src 绝对相等
    function checkMatch() {
        const match = firstCard.querySelector('img').src === secondCard.querySelector('img').src;
        match ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);
        resetBoard();
        checkGameOver();
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 1000);
    }

    function resetBoard() {
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
    }

    function startTimer() {
        clearInterval(timer);
        seconds = 0;
        secondsDisplay.textContent = 0;
        isGameStarted = true;
        timer = setInterval(() => {
            if (isGameStarted) {
                seconds++;
                secondsDisplay.textContent = seconds;
            }
        }, 1000);
    }

    function resetGameState() {
        clearInterval(timer);
        seconds = 0;
        moves = 0;
        isGameStarted = false;
        hasFlippedCard = false;
        lockBoard = false;
        firstCard = null;
        secondCard = null;
        secondsDisplay.textContent = 0;
        movesDisplay.textContent = 0;
        loadingText.textContent = "加载图片中...";
    }

    function checkGameOver() {
        const total = cards.length;
        const flipped = document.querySelectorAll('.flip').length;
        if (flipped === total) {
            isGameStarted = false;
            clearInterval(timer);
            setTimeout(() => {
                alert(`成功！\n用时：${seconds}秒\n步数：${moves}步`);
            }, 500);
        }
    }

    function shuffleArray(arr) {
        let a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    resetBtn.addEventListener('click', initGame);
    window.addEventListener('DOMContentLoaded', initGame);
</script>
</body>
</html>
